<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANDRYland — Official Dashboard</title>

<!-- FONT ZEN + AI + CORSIVO IMPERFETTO -->
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        padding: 0;
        background: #0A0A0A;
        font-family: "Segoe UI", sans-serif;
        color: #F8F8F0;
        text-align: center;
    }

    .container {
        max-width: 900px;
        margin: auto;
        padding: 40px 20px;
    }

    .logo {
        width: 320px;
        margin: 0 auto 40px;
        filter: drop-shadow(0 0 12px #D4AF37);
    }

    h1 {
        font-size: 3rem;
        font-weight: 600;
        color: #D4AF37;
        margin-bottom: 20px;
        font-family: "Caveat", cursive;
        letter-spacing: 1px;
    }

    /* SOCIAL BUTTONS */
    .btn-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        width: 80%;
        max-width: 350px;
        margin: 12px auto;
        padding: 12px 20px;
        background: #1A1A1A;
        border: 1px solid #333;
        color: #F8F8F0;
        text-decoration: none;
        font-size: 1.1rem;
        border-radius: 40px;
        font-weight: 500;
        transition: 0.2s;
    }

    .btn-icon:hover {
        transform: scale(1.05);
        background: #222;
    }

    .btn-icon img {
        width: 26px;
        height: 26px;
        display: block;
    }

    .icon-telegram {
        border-radius: 50%;
        filter: drop-shadow(0 0 4px rgba(0, 150, 255, 0.6))
                drop-shadow(0 0 8px rgba(0, 150, 255, 0.3));
    }

    .icon-instagram {
        border-radius: 6px;
        filter: drop-shadow(0 0 4px rgba(255, 0, 150, 0.5))
                drop-shadow(0 0 8px rgba(255, 100, 200, 0.3));
    }

    .icon-tiktok {
        border-radius: 6px;
        filter: drop-shadow(0 0 4px rgba(0, 255, 255, 0.5))
                drop-shadow(0 0 8px rgba(255, 0, 255, 0.3));
    }

    footer {
        margin-top: 60px;
        font-size: 0.9rem;
        color: #777;
    }
</style>
</head>

<body>

<div class="container">

    <!-- LOGO -->
    <img src="assets/logoofficial.png" class="logo" alt="Logo ANDRYland">

    <!-- TITOLO ZEN + AI + CORSIVO IMPERFETTO -->
    <h1>ANDRYland Social Club</h1>

    <!-- SOCIAL -->
    <a class="btn-icon" href="https://t.me/ANDRAland" target="_blank">
        <img src="assets/t_logo.png" class="icon-telegram" alt="Telegram">
        Official Telegram
    </a>

    <a class="btn-icon" href="https://www.instagram.com/andralandsocialclub" target="_blank">
        <img src="assets/instagram.png" class="icon-instagram" alt="Instagram">
        Instagram Social Club
    </a>

    <a class="btn-icon" href="#" target="_blank">
        <img src="assets/tiktoklogo.png" class="icon-tiktok" alt="TikTok">
        TikTok
    </a>

    <footer>
        © 2026 ANDRYland — Human‑AI Experience
    </footer>

</div>

</body>
</html>
