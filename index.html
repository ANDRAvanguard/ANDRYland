<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANDRAland — Official Dashboard</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #0A0A0A;
        font-family: "Segoe UI", sans-serif;
        color: #F8F8F0;
        text-align: center;
    }

    .container {
        max-width: 900px;
        margin: auto;
        padding: 40px 20px;
    }

    .logo {
        width: 260px;
        margin: 0 auto 30px;
    }

    h1 {
        font-size: 2.4rem;
        font-weight: 300;
        letter-spacing: 2px;
        color: #D4AF37;
        margin-bottom: 10px;
    }

    p.subtitle {
        font-size: 1.1rem;
        color: #cfcfcf;
        margin-bottom: 40px;
    }

    .btn {
        display: block;
        width: 80%;
        max-width: 350px;
        margin: 15px auto;
        padding: 14px 20px;
        background: linear-gradient(90deg, #D4AF37, #b68b2e);
        color: #0A0A0A;
        text-decoration: none;
        font-size: 1.1rem;
        border-radius: 40px;
        font-weight: bold;
        transition: 0.2s;
    }

    .btn:hover {
        transform: scale(1.05);
        background: linear-gradient(90deg, #e8c45a, #d4af37);
    }

    .qr-section {
        margin-top: 50px;
    }

    .qr {
        width: 200px;
        margin: 20px auto;
        border-radius: 20px;
    }

    footer {
        margin-top: 60px;
        font-size: 0.9rem;
        color: #777;
    }
</style>
</head>

<body>

<div class="container">

    <!-- LOGO -->
    <img src="assets/logo-andraland.png" class="logo" alt="Logo ANDRAland">

    <h1>ANDRAland Social Club</h1>
    <p class="subtitle">Il portale umano‑AI dove arte, mente e tecnologia si incontrano.</p>

    <!-- PULSANTI SOCIAL -->
    <a class="btn" href="https://t.me/ANDRAland" target="_blank">Telegram Ufficiale</a>
    <a class="btn" href="https://www.instagram.com/andralandsocialclub" target="_blank">Instagram Social Club</a>
    <a class="btn" href="#" target="_blank">TikTok (in arrivo)</a>

    <!-- PAGAMENTO -->
    <a class="btn" href="payment.html">Paga con PayPal / Stripe</a>

   <!-- QR SECTION -->
<!-- QR SECTION -->
<div class="qr-section">
    <h2 style="color:#D4AF37; font-weight:300;">Scansiona e unisciti</h2>

    <p>Instagram</p>
    <img src="assets/photo_2026-05-13_00-41-31.jpg" class="qr" alt="QR Instagram ANDRAland Social Club">

    <p>Telegram</p>
    <img src="assets/photo_2026-05-13_00-18-46.jpg" class="qr" alt="QR Telegram ANDRAland">
</div>



    <footer>
        © 2026 ANDRAland — Human‑AI Experience  
    </footer>

</div>

</body>
</html>
